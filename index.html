<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#20110d">
<title>Theatre Diary</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;width:100%;overflow-x:hidden}
body{background:linear-gradient(180deg,#f7f4ed 0,#efe6d8 42%,#e6d8c8 100%);color:#2d211b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;-webkit-text-size-adjust:100%}
button,input,select,textarea{font:inherit}button{cursor:pointer}
.topbar{position:sticky;top:0;z-index:80;background:rgba(247,244,237,.94);border-bottom:1px solid rgba(83,58,45,.16);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.topin{max-width:1180px;margin:0 auto;padding:8px 12px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.brand{border:0;background:transparent;color:#34231b;font-family:Georgia,serif;font-size:21px;font-weight:900;padding:7px 8px;border-radius:12px;white-space:nowrap}
.brand:before{content:"🎭";font-family:Apple Color Emoji,Segoe UI Emoji;margin-right:7px;font-size:17px}
.nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.btn,.pillBtn{border:1px solid rgba(83,58,45,.18);background:rgba(255,255,255,.48);color:#3a2a22;border-radius:999px;padding:7px 10px;white-space:nowrap}
.btn:hover,.pillBtn:hover{background:rgba(255,255,255,.78)}
.pillBtn.active{background:#fffdf7;border-color:rgba(122,82,55,.32);color:#7a4e35}
.wrap{max-width:1180px;margin:0 auto;padding:14px 12px 44px;width:100%}
.hero{border:1px solid rgba(83,58,45,.13);background:rgba(255,253,247,.70);border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 16px 45px rgba(83,58,45,.10)}
h1,h2,h3{font-family:Georgia,serif;line-height:1.05}h1{font-size:36px;margin:0 0 6px}h2{font-size:25px;margin:0 0 10px}h3{font-size:19px;margin:0 0 8px}
.muted{color:rgba(45,33,27,.66)}.tiny{font-size:12px;color:rgba(45,33,27,.58);line-height:1.35}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}.input,.select,.textarea{border:1px solid rgba(83,58,45,.18);background:rgba(255,253,247,.78);color:#2d211b;border-radius:14px;padding:9px 10px;min-height:38px}.input{flex:1 1 280px;min-width:0}.select{flex:0 0 auto;max-width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px}.card{border:1px solid rgba(83,58,45,.13);background:rgba(255,253,247,.66);border-radius:18px;padding:12px;min-width:0;box-shadow:0 10px 28px rgba(83,58,45,.08)}
.perfCard{cursor:pointer;transition:transform .12s ease,background .12s ease}.perfCard:hover,.lineRow:hover{transform:translateY(-1px);background:rgba(255,253,247,.92)}
.showTitle{font-family:Georgia,serif;font-weight:900;font-size:21px;line-height:1.05;margin-bottom:4px;color:#2f2119}.meta{font-size:13px;color:rgba(45,33,27,.64);line-height:1.32}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{border:1px solid rgba(83,58,45,.13);background:rgba(255,255,255,.55);border-radius:999px;padding:4px 7px;font-size:12px;color:#6b4936}.cover{border-color:rgba(176,110,66,.34);background:rgba(210,146,92,.16);color:#774625;font-weight:850}.good{border-color:rgba(102,143,107,.32);background:rgba(145,184,145,.16);color:#3f6947}.purple{border-color:rgba(161,138,170,.28);background:rgba(161,138,170,.12);color:#65506f}
.yearBox{border:1px solid rgba(83,58,45,.13);background:rgba(255,253,247,.50);border-radius:20px;margin:10px 0;overflow:hidden}
.yearBox summary{list-style:none;cursor:pointer;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.36);font-family:Georgia,serif;font-size:22px;font-weight:900}
.yearBox summary::-webkit-details-marker{display:none}.yearBox summary:after{content:"▾";font-family:Arial;font-size:14px;color:#7a4e35}.yearBox:not([open]) summary:after{content:"▸"}
.yearInner{padding:10px}.lineList{display:grid;gap:7px}
.lineRow{border:1px solid rgba(83,58,45,.13);background:rgba(255,253,247,.68);border-radius:14px;padding:9px 10px;display:grid;grid-template-columns:minmax(72px,110px) minmax(0,1fr) auto;gap:10px;align-items:center;cursor:pointer;transition:transform .12s ease,background .12s ease}
.lineDate{color:#7a4e35;font-weight:850;font-size:13px}.lineMain{min-width:0}.lineTitle{font-weight:900;color:#2d211b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lineSub{font-size:12px;color:rgba(45,33,27,.58);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lineBadges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.split{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;align-items:start}.section{margin-top:13px}.castLine{display:grid;grid-template-columns:minmax(120px,215px) minmax(0,1fr);gap:8px;align-items:start;border-bottom:1px solid rgba(83,58,45,.10);padding:6px 0}.role{font-weight:850;color:#7a4e35;line-height:1.22}.nameBtn,.linkish{border:0;background:transparent;color:#2d211b;text-align:left;padding:0;font-weight:800;text-decoration:underline;text-decoration-color:rgba(83,58,45,.22);text-underline-offset:3px}.linkish{color:#6d402a;text-decoration-color:rgba(109,64,42,.28)}
.personStats{font-size:12px;color:rgba(45,33,27,.54);margin-left:4px;white-space:nowrap}.ensemble{display:flex;gap:6px;flex-wrap:wrap}.ensChip{border:1px solid rgba(83,58,45,.13);background:rgba(255,255,255,.50);border-radius:999px;padding:5px 8px;font-size:13px}
.panel{position:fixed;right:14px;top:64px;width:min(400px,calc(100vw - 28px));max-height:calc(100vh - 82px);overflow:auto;z-index:150;background:#fffaf1;border:1px solid rgba(83,58,45,.18);border-radius:20px;padding:14px;box-shadow:0 30px 90px rgba(83,58,45,.22)}.closeBtn{float:right}.list{display:grid;gap:7px}.row{border:1px solid rgba(83,58,45,.12);background:rgba(255,255,255,.46);border-radius:14px;padding:8px;min-width:0}.row:hover{background:rgba(255,255,255,.76)}
.tableWrap{overflow:auto;-webkit-overflow-scrolling:touch}.table{width:100%;border-collapse:collapse;font-size:14px}.table th,.table td{border-bottom:1px solid rgba(83,58,45,.10);padding:7px;text-align:left;vertical-align:top}.table th{color:#7a4e35;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.textarea{width:100%;min-height:110px;resize:vertical}.smallInput{width:100%;margin-bottom:8px}.loadMore{display:block;margin:14px auto 0}.statGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}.stat{border:1px solid rgba(83,58,45,.12);background:rgba(255,255,255,.46);border-radius:16px;padding:10px}.stat .num{font-family:Georgia,serif;font-weight:900;font-size:27px}.stat .lab{font-size:12px;color:rgba(45,33,27,.58)}
.noteBox{border:1px solid rgba(83,58,45,.13);background:rgba(255,255,255,.44);border-radius:15px;padding:10px;margin:0 0 10px;white-space:pre-wrap}.groupHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:14px 0 8px}.hr{height:1px;background:rgba(83,58,45,.12);margin:12px 0}pre{white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.52);border:1px solid rgba(83,58,45,.12);padding:10px;border-radius:14px;overflow:auto}
body.compact .card{padding:9px;border-radius:14px}body.compact .hero{padding:12px;border-radius:18px}body.compact .castLine{padding:4px 0;gap:6px}body.compact .ensChip{padding:4px 7px}body.compact .chip{padding:3px 6px}body.compact .grid{gap:8px}body.compact .showTitle{font-size:20px}
.boot{max-width:720px;margin:0 auto;padding:22px 16px}.boot-card{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.075);border-radius:20px;padding:18px}.ok{color:#bff0c7}.warn{color:#ffe3a6}.bad{color:#ffb3a6}

.homeGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:10px;align-items:start}
.homeLinks{display:flex;flex-wrap:wrap;gap:7px}
.yearLinks{display:flex;flex-wrap:wrap;gap:6px;max-height:120px;overflow:auto;padding-right:4px}
.moduleTitle{display:flex;align-items:center;justify-content:space-between;gap:8px}
.chart{display:grid;gap:6px}
.barRow{display:grid;grid-template-columns:58px minmax(0,1fr) 38px;gap:8px;align-items:center;font-size:13px}
.barTrack{height:12px;background:rgba(83,58,45,.10);border-radius:999px;overflow:hidden}
.barFill{height:100%;background:linear-gradient(90deg,#d7c8b8,#a88a75);border-radius:999px}
.calendarControls{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.calendarWrap{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.monthBox{border:1px solid rgba(83,58,45,.12);background:rgba(255,255,255,.42);border-radius:14px;padding:8px}
.monthName{font-family:Georgia,serif;font-weight:900;margin-bottom:5px;color:#5b3928}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{border:0;background:rgba(83,58,45,.06);color:#4a382f;border-radius:7px;min-height:23px;font-size:11px;padding:2px}
.day.has{background:#fffdf7;border:1px solid rgba(122,82,55,.25);font-weight:900;color:#6d402a}
.day.multi{background:#e7d2be;color:#4a2b1c}
.day.empty{background:transparent;pointer-events:none}
.diaryHead{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:14px 0 8px}
@media(max-width:760px){.homeGrid{grid-template-columns:1fr}.calendarWrap{grid-template-columns:1fr}.barRow{grid-template-columns:46px minmax(0,1fr) 34px}.yearLinks{max-height:none}}

@media(max-width:760px){
  .topin{padding:7px 8px}.brand{font-size:18px;padding:7px 5px}.nav{margin-left:0;flex:1 1 100%;justify-content:flex-start;gap:5px}.btn,.pillBtn{padding:6px 8px;font-size:13px}
  .wrap{padding:10px 8px 34px}.hero{border-radius:18px;padding:12px}h1{font-size:28px}h2{font-size:22px}.grid{grid-template-columns:1fr;gap:8px}.card{border-radius:15px;padding:10px}.split{display:block}.split aside{margin-top:10px}
  .castLine{grid-template-columns:1fr;gap:2px;padding:6px 0}.role{font-size:14px}.nameBtn{font-size:16px}.panel{left:8px;right:8px;top:auto;bottom:8px;width:auto;max-height:76vh;border-radius:18px}
  .input{flex-basis:100%}.select{flex:1 1 135px;min-width:0}.showTitle{font-size:20px}.personStats{font-size:11px;display:inline}.ensChip{font-size:12px;padding:5px 7px}
  .lineRow{grid-template-columns:1fr;gap:4px}.lineDate{font-size:12px}.lineBadges{justify-content:flex-start}.yearBox summary{font-size:19px;padding:10px 12px}
}
</style>
</head>
<body>
<div id="app"><main class="boot"><section class="boot-card"><h1 style="font-family:Georgia,serif;margin:0 0 8px">Theatre Diary</h1><p class="muted">Loading the inline dashboard…</p><div class="row warn">Loading theatre-data.json…</div></section></main></div>
<script>
(function(){
var db=null, idx=null, edits=readEdits();
var state={view:'home',id:null,q:'',year:'all',type:'all',cover:false,limit:72,history:[],hIndex:-1,panel:null,peopleMode:'appearances',sort:'old',density:(localStorage.getItem('theatreDiaryDensity')||'comfy'),layout:(localStorage.getItem('theatreDiaryLayout')||'lines'),groupYears:(localStorage.getItem('theatreDiaryGroupYears')||'yes'),calendarYear:null,qDelay:null,focusId:null};
window.onerror=function(msg,src,line,col,err){showError('Dashboard crashed',String(msg)+' at line '+line);};

function esc(s){s=s==null?'':String(s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function norm(s){return (s==null?'':String(s)).toLowerCase().replace(/[\u2018\u2019]/g,"'").replace(/[^a-z0-9]+/g,' ').replace(/^\s+|\s+$/g,'');}
function roleNorm(s){s=norm(s).replace(/\bensemble\b/g,'').replace(/\btrack\b/g,'').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'');return s||'ensemble';}
function vals(o){var a=[],k;for(k in o){if(Object.prototype.hasOwnProperty.call(o,k))a.push(o[k]);}return a;}
function keys(o){var a=[],k;for(k in o){if(Object.prototype.hasOwnProperty.call(o,k))a.push(k);}return a;}
function by(map,id){return map&&map[String(id)]?map[String(id)]:null;}
function showOf(p){var s=by(db.shows,p.showId);return s?s.title:'Untitled';}
function venueOf(p){var v=by(db.venues,p.venueId);return v?v.name+(v.city?' · '+v.city:''):'';}
function fmtDate(iso){if(!iso)return'';var x=String(iso).split('-');if(x.length!==3)return iso;var d=new Date(Number(x[0]),Number(x[1])-1,Number(x[2]));var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
function shortDate(iso){if(!iso)return'';var x=String(iso).split('-');if(x.length!==3)return iso;var d=new Date(Number(x[0]),Number(x[1])-1,Number(x[2]));var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+d.getDate();}
function yearOf(iso){return iso?String(iso).slice(0,4):'';}
function sourceCast(p){return p&&p.source&&p.source.castNormalized?p.source.castNormalized:'';}
function personName(id){var p=by(db.people,id);return p?p.name:'Unknown';}
function coverName(v){v=v==null?'':String(v);var n=norm(v);if(!n)return '';if(n==='u s'||n==='us'||n.indexOf('understudy')>=0)return 'Understudy';if(n==='s b'||n==='sb'||n.indexOf('standby')>=0)return 'Standby';if(n==='alt'||n.indexOf('alternate')>=0)return 'Alternate';if(n==='s w'||n==='sw'||n.indexOf('swing')>=0)return 'Swing';if(n==='e c'||n==='ec'||n.indexOf('emergency')>=0)return 'Emergency cover';if(n==='t r'||n==='tr'||n.indexOf('temporary')>=0)return 'Temporary replacement';if(n.indexOf('special')>=0)return 'Special appearance';return v.replace(/^\*+\s*/,'').replace(/\s+/g,' ');}
function ordinal(n){var s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

function load(){var xhr=new XMLHttpRequest();xhr.open('GET','theatre-data.json?v=layout1',true);xhr.onreadystatechange=function(){if(xhr.readyState===4){if(xhr.status>=200&&xhr.status<300){try{db=JSON.parse(xhr.responseText);buildIndexes();go('home',null,true);}catch(e){showError('Could not parse theatre-data.json',e.message);}}else showError('Could not load theatre-data.json','HTTP status '+xhr.status+'.');}};xhr.onerror=function(){showError('Could not load theatre-data.json','Network error.');};xhr.send();}
function showError(t,m){document.getElementById('app').innerHTML='<main class="wrap"><section class="card"><h1>'+esc(t)+'</h1><p class="muted">'+esc(m)+'</p></section></main>';}

function buildIndexes(){
  var apps=db.appearances||[], perfs=db.performances||{}, i,a,p,r,k,prodKey;
  idx={perfApps:{},personApps:{},roleApps:{},showPerfs:{},venuePerfs:{},coverPerf:{},personPerfSets:{},personRoleSets:{},personShowSets:{},showPeople:{},searchText:{},creativeByPerf:{},creativeByPerson:{},allRolesByName:{},attendanceNo:{},showViewingNo:{},showViewingTotal:{}};
  for(i=0;i<apps.length;i++){
    a=apps[i];p=by(perfs,a.performanceId);r=by(db.roles,a.roleId);
    if(!idx.perfApps[a.performanceId])idx.perfApps[a.performanceId]=[]; idx.perfApps[a.performanceId].push(a);
    if(!idx.personApps[a.personId])idx.personApps[a.personId]=[]; idx.personApps[a.personId].push(a);
    if(!idx.roleApps[a.roleId])idx.roleApps[a.roleId]=[]; idx.roleApps[a.roleId].push(a);
    if(a.coverType||a.coverLabel||a.appearanceType==='swing')idx.coverPerf[a.performanceId]=true;
    if(p){ if(!idx.personPerfSets[a.personId])idx.personPerfSets[a.personId]={}; idx.personPerfSets[a.personId][a.performanceId]=1; if(!idx.personShowSets[a.personId])idx.personShowSets[a.personId]={}; idx.personShowSets[a.personId][p.showId]=1; if(!idx.showPeople[p.showId])idx.showPeople[p.showId]={}; idx.showPeople[p.showId][a.personId]=1; }
    if(p&&r){ if(!idx.personRoleSets[a.personId])idx.personRoleSets[a.personId]={}; prodKey=String(p.showId)+'|'+norm(p.type||'')+'|'+roleNorm(r.name||a.roleRaw||''); idx.personRoleSets[a.personId][prodKey]=1; k=String(r.showId)+'|'+roleNorm(r.name); if(!idx.allRolesByName[k])idx.allRolesByName[k]={roleName:r.name,showId:r.showId,apps:[]}; idx.allRolesByName[k].apps.push(a); }
  }
  var ps=vals(perfs); ps.sort(function(a,b){return String(a.date).localeCompare(String(b.date))||a.id-b.id;});
  var showCounts={};
  for(i=0;i<ps.length;i++){p=ps[i]; idx.attendanceNo[p.id]=i+1; showCounts[p.showId]=(showCounts[p.showId]||0)+1; idx.showViewingNo[p.id]=showCounts[p.showId]; if(!idx.showPerfs[p.showId])idx.showPerfs[p.showId]=[]; idx.showPerfs[p.showId].push(p); if(!idx.venuePerfs[p.venueId])idx.venuePerfs[p.venueId]=[]; idx.venuePerfs[p.venueId].push(p); idx.searchText[p.id]=norm(showOf(p)+' '+venueOf(p)+' '+(p.type||'')+' '+(p.time||'')+' '+(p.notes||'')+' '+sourceCast(p)); }
  for(k in showCounts)idx.showViewingTotal[k]=showCounts[k];
  var cr=db.creativeCredits||[], c; for(i=0;i<cr.length;i++){c=cr[i]; if(!idx.creativeByPerf[c.performanceId])idx.creativeByPerf[c.performanceId]=[]; idx.creativeByPerf[c.performanceId].push(c); if(!idx.creativeByPerson[c.personId])idx.creativeByPerson[c.personId]=[]; idx.creativeByPerson[c.personId].push(c);}
}
function showNumberChips(p){return '<span class="chip purple">Diary #'+idx.attendanceNo[p.id]+'</span><span class="chip good">'+esc(showOf(p))+' #'+idx.showViewingNo[p.id]+' of '+idx.showViewingTotal[p.showId]+'</span>';}
function stat(personId,currentPerfId){var ps=idx.personPerfSets[personId]||{},rs=idx.personRoleSets[personId]||{},ss=idx.personShowSets[personId]||{};var pc=keys(ps).length,rc=keys(rs).length,sc=keys(ss).length,other=ps[currentPerfId]?pc-1:pc;if(other<0)other=0;return{other:other,roles:rc,shows:sc,perfs:pc};}
function personButton(personId,currentPerfId){var s=stat(personId,currentPerfId),rw=s.roles===1?'role':'roles',tw=s.other===1?'other time':'other times';return '<button class="nameBtn" onclick="TD.openPerson('+personId+')">'+esc(personName(personId))+'</button><span class="personStats"> '+s.other+' '+tw+' / '+s.roles+' '+rw+'</span>';}

function shell(inner){return '<div class="topbar"><div class="topin"><button class="brand" onclick="TD.go(\'home\',null)">Theatre Diary</button><div class="nav"><button class="btn" onclick="TD.go(\'home\',null)">Home</button><button class="btn" onclick="TD.back()">Back</button><button class="btn" onclick="TD.forward()">Forward</button><button class="btn" onclick="TD.go(\'people\',null)">People</button><button class="btn" onclick="TD.go(\'shows\',null)">Shows</button><button class="btn" onclick="TD.go(\'roles\',null)">Roles</button><button class="btn" onclick="TD.go(\'covers\',null)">Covers</button><button class="btn" onclick="TD.go(\'stats\',null)">Stats</button><button class="btn" onclick="TD.toggleDensity()">'+(state.density==='compact'?'Comfy':'Compact')+'</button><button class="btn" onclick="TD.random()">Random</button></div></div></div>'+inner+(state.panel?renderPanel(state.panel):'');}
function render(){document.body.className=state.density==='compact'?'compact':'';var h=''; if(state.view==='home')h=home(); else if(state.view==='perf')h=perfPage(state.id); else if(state.view==='person')h=personPage(state.id); else if(state.view==='show')h=showPage(state.id); else if(state.view==='venue')h=venuePage(state.id); else if(state.view==='people')h=peoplePage(); else if(state.view==='shows')h=showsPage(); else if(state.view==='roles')h=rolesPage(); else if(state.view==='role')h=rolePage(state.id); else if(state.view==='covers')h=coversPage(); else if(state.view==='stats')h=statsPage(); else if(state.view==='edits')h=editsPage(); else h=home(); document.getElementById('app').innerHTML=shell(h);}
function go(v,id,replace){state.view=v;state.id=id;state.panel=null;if(!replace){if(state.hIndex<state.history.length-1)state.history=state.history.slice(0,state.hIndex+1);state.history.push({v:v,id:id});state.hIndex=state.history.length-1;}else if(!state.history.length){state.history.push({v:v,id:id});state.hIndex=0;}render();setTimeout(function(){window.scrollTo(0,0);},0);}
function back(){if(state.hIndex>0){state.hIndex--;var h=state.history[state.hIndex];state.view=h.v;state.id=h.id;state.panel=null;render();setTimeout(function(){window.scrollTo(0,0);},0);}}
function forward(){if(state.hIndex<state.history.length-1){state.hIndex++;var h=state.history[state.hIndex];state.view=h.v;state.id=h.id;state.panel=null;render();setTimeout(function(){window.scrollTo(0,0);},0);}}

function sortedPerformances(){var ps=vals(db.performances);ps.sort(function(a,b){return state.sort==='old'?String(a.date).localeCompare(String(b.date)):String(b.date).localeCompare(String(a.date));});return ps;}

function groupedListing(filtered){
  var limited=filtered.slice(0,state.limit), groups={}, order=[], i,p,y,out='';
  for(i=0;i<limited.length;i++){
    p=limited[i];
    y=yearOf(p.date)||'Unknown';
    if(!groups[y]){groups[y]=[];order.push(y);}
    groups[y].push(p);
  }
  order.sort(function(a,b){
    return state.sort==='old' ? String(a).localeCompare(String(b)) : String(b).localeCompare(String(a));
  });
  for(i=0;i<order.length;i++){
    y=order[i];
    out+='<details class="yearBox" open><summary><span>'+esc(y)+'</span><span class="chip">'+groups[y].length+'</span></summary><div class="yearInner">'+renderListing(groups[y])+'</div></details>';
  }
  if(filtered.length>state.limit) out+='<button class="btn loadMore" onclick="TD.more()">Load more</button>';
  return out;
}
