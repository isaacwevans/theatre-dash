<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#20110d">
<title>Theatre Diary</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;width:100%;overflow-x:hidden}
body{
  background:radial-gradient(circle at 0 0,#6b3b25 0,#2a1712 36%,#120d0b 100%);
  color:#fff3e4;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  -webkit-text-size-adjust:100%;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:#ffe0a3}
code{color:#ffe0a3}
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(20,12,10,.97);
  border-bottom:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.topin{max-width:1180px;margin:0 auto;padding:8px 12px;display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap}
.brand{
  border:0;background:transparent;color:#fff3e4;
  font-family:Georgia,serif;font-size:21px;font-weight:900;
  padding:7px 8px;border-radius:12px;white-space:nowrap;
}
.brand:before{content:"🎭";font-family:Apple Color Emoji,Segoe UI Emoji;margin-right:7px;font-size:17px}
.nav{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;overflow:visible;max-width:none;padding-bottom:1px}
.btn,.pillBtn{
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  color:#fff3e4;border-radius:999px;padding:7px 10px;white-space:nowrap;
}
.btn:hover,.pillBtn:hover{background:rgba(255,255,255,.14)}
.wrap{max-width:1180px;margin:0 auto;padding:14px 12px 44px;width:100%}
.hero{
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.045));
  border-radius:24px;padding:16px;margin-bottom:12px;
  box-shadow:0 22px 80px rgba(0,0,0,.24);
}
h1,h2,h3{font-family:Georgia,serif;line-height:1.05}
h1{font-size:36px;margin:0 0 6px}
h2{font-size:25px;margin:0 0 10px}
h3{font-size:19px;margin:0 0 8px}
p{line-height:1.42}
.muted{color:rgba(255,243,228,.68)}
.tiny{font-size:12px;color:rgba(255,243,228,.62);line-height:1.35}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}
.input,.select,.textarea{
  border:1px solid rgba(255,255,255,.16);
  background:rgba(0,0,0,.20);
  color:#fff3e4;border-radius:14px;padding:9px 10px;min-height:38px;
}
.input{flex:1 1 280px;min-width:0}
.select{flex:0 0 auto;max-width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px}
.card{
  border:1px solid rgba(255,255,255,.13);
  background:rgba(255,255,255,.075);
  border-radius:18px;padding:12px;min-width:0;
  box-shadow:0 14px 42px rgba(0,0,0,.16);
}
.card.flush{padding:0;overflow:hidden}
.perfCard{cursor:pointer;transition:transform .12s ease,background .12s ease}
.perfCard:hover{transform:translateY(-1px);background:rgba(255,255,255,.11)}
.showTitle{font-family:Georgia,serif;font-weight:900;font-size:22px;line-height:1.05;margin-bottom:4px}
.meta{font-size:13px;color:rgba(255,243,228,.72);line-height:1.32}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.18);
  border-radius:999px;padding:4px 7px;font-size:12px;color:#ffe3ad;
}
.cover{border-color:rgba(255,205,112,.48);background:rgba(255,191,73,.16);color:#ffe0a2;font-weight:850}
.good{border-color:rgba(155,237,180,.45);background:rgba(100,210,140,.14);color:#d5ffd9}
.purple{border-color:rgba(210,180,255,.45);background:rgba(160,120,255,.14);color:#eadbff}
.split{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px;align-items:start}
.section{margin-top:13px}
.castLine{
  display:grid;grid-template-columns:minmax(120px,215px) minmax(0,1fr);
  gap:8px;align-items:start;border-bottom:1px solid rgba(255,255,255,.08);padding:6px 0;
}
.role{font-weight:850;color:#ffdfa3;line-height:1.22}
.nameBtn,.linkish{
  border:0;background:transparent;color:#fff3e4;text-align:left;padding:0;
  font-weight:800;text-decoration:underline;text-decoration-color:rgba(255,255,255,.20);text-underline-offset:3px;
}
.linkish{color:#ffe2a4;font-weight:800;text-decoration-color:rgba(255,226,164,.34)}
.personStats{font-size:12px;color:rgba(255,243,228,.58);margin-left:4px;white-space:nowrap}
.ensemble{display:flex;gap:6px;flex-wrap:wrap}
.ensChip{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.065);border-radius:999px;padding:5px 8px;font-size:13px}
.panel{
  position:fixed;right:14px;top:64px;width:min(400px,calc(100vw - 28px));
  max-height:calc(100vh - 82px);overflow:auto;z-index:150;
  background:#20120e;border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:14px;
  box-shadow:0 30px 90px rgba(0,0,0,.58);
}
.closeBtn{float:right}
.list{display:grid;gap:7px}
.row{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.055);border-radius:14px;padding:8px;min-width:0}
.row:hover{background:rgba(255,255,255,.08)}
.tableWrap{overflow:auto;-webkit-overflow-scrolling:touch}
.table{width:100%;border-collapse:collapse;font-size:14px}
.table th,.table td{border-bottom:1px solid rgba(255,255,255,.10);padding:7px;text-align:left;vertical-align:top}
.table th{color:#ffdfa3;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.textarea{width:100%;min-height:110px;resize:vertical}
.smallInput{width:100%;margin-bottom:8px}
.loadMore{display:block;margin:14px auto 0}
.statGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}
.stat{border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.16);border-radius:16px;padding:10px}
.stat .num{font-family:Georgia,serif;font-weight:900;font-size:27px}
.stat .lab{font-size:12px;color:rgba(255,243,228,.62)}
.segment{display:flex;gap:6px;flex-wrap:wrap}
.segment .pillBtn.active{background:rgba(255,224,163,.18);border-color:rgba(255,224,163,.42);color:#ffe0a3}
.noteFlag{white-space:pre-wrap}
pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.12);padding:10px;border-radius:14px;overflow:auto}
details summary{cursor:pointer}
.hr{height:1px;background:rgba(255,255,255,.1);margin:12px 0}

body.compact .card{padding:9px;border-radius:14px}
body.compact .hero{padding:12px;border-radius:18px}
body.compact .castLine{padding:4px 0;gap:6px}
body.compact .ensChip{padding:4px 7px}
body.compact .chip{padding:3px 6px}
body.compact .grid{gap:8px}
body.compact .showTitle{font-size:20px}
.issueBadge{display:inline-block;margin:2px 4px 2px 0}
.matrixRole{min-width:130px}
.noteBox{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);border-radius:15px;padding:10px;margin:0 0 10px;white-space:pre-wrap}
.groupHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:14px 0 8px}

.boot{max-width:720px;margin:0 auto;padding:22px 16px}
.boot-card{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.075);border-radius:20px;padding:18px}
.ok{color:#bff0c7}.warn{color:#ffe3a6}.bad{color:#ffb3a6}
@media(max-width:760px){
  .topin{padding:7px 8px;align-items:flex-start}
  .nav{margin-left:0;flex:1 1 100%;max-width:none}
  .brand{font-size:18px;padding:7px 5px}
  .btn,.pillBtn{padding:6px 8px;font-size:13px}
  .wrap{padding:10px 8px 34px}
  .hero{border-radius:18px;padding:12px}
  h1{font-size:28px}
  h2{font-size:22px}
  .grid{grid-template-columns:1fr;gap:8px}
  .card{border-radius:15px;padding:10px}
  .split{display:block}
  .split aside{margin-top:10px}
  .castLine{grid-template-columns:1fr;gap:2px;padding:6px 0}
  .role{font-size:14px}
  .nameBtn{font-size:16px}
  .panel{left:8px;right:8px;top:auto;bottom:8px;width:auto;max-height:76vh;border-radius:18px}
  .input{flex-basis:100%}
  .select{flex:1 1 135px;min-width:0}
  .showTitle{font-size:20px}
  .personStats{font-size:11px;display:inline}
  .ensChip{font-size:12px;padding:5px 7px}
  .table{font-size:13px}
}
</style>
</head>
<body>
<div id="app">
  <main class="boot">
    <section class="boot-card">
      <h1 style="font-family:Georgia,serif;margin:0 0 8px">Theatre Diary</h1>
      <p class="muted">Starting the inline dashboard…</p>
      <div class="row warn" id="boot">Loading theatre-data.json…</div>
    </section>
  </main>
</div>

<script>
(function(){
var db=null, idx=null, edits=readEdits();
var state={view:'home',id:null,q:'',year:'all',type:'all',cover:false,limit:72,history:[],hIndex:-1,panel:null,peopleMode:'appearances',sort:'new',density:(localStorage.getItem('theatreDiaryDensity')||'comfy')};
window.onerror=function(msg,src,line,col,err){showError('Dashboard crashed',String(msg)+' at line '+line);};

function esc(s){s=s==null?'':String(s);return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function norm(s){return (s==null?'':String(s)).toLowerCase().replace(/[\u2018\u2019]/g,"'").replace(/[^a-z0-9]+/g,' ').replace(/^\s+|\s+$/g,'');}
function roleNorm(s){s=norm(s).replace(/\bensemble\b/g,'').replace(/\btrack\b/g,'').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'');return s||'ensemble';}
function vals(o){var a=[],k;for(k in o){if(Object.prototype.hasOwnProperty.call(o,k))a.push(o[k]);}return a;}
function keys(o){var a=[],k;for(k in o){if(Object.prototype.hasOwnProperty.call(o,k))a.push(k);}return a;}
function by(map,id){return map&&map[String(id)]?map[String(id)]:null;}
function showOf(p){var s=by(db.shows,p.showId);return s?s.title:'Untitled';}
function venueOf(p){var v=by(db.venues,p.venueId);return v?v.name+(v.city?' · '+v.city:''):'';}
function fmtDate(iso){if(!iso)return'';var x=String(iso).split('-');if(x.length!==3)return iso;var d=new Date(Number(x[0]),Number(x[1])-1,Number(x[2]));var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
function yearOf(iso){return iso?String(iso).slice(0,4):'';}
function sourceCast(p){return p&&p.source&&p.source.castNormalized?p.source.castNormalized:'';}
function coverName(v){
  v=v==null?'':String(v);
  var n=norm(v);
  if(!n)return '';
  if(n==='u s'||n==='us'||n.indexOf('understudy')>=0)return 'Understudy';
  if(n==='s b'||n==='sb'||n.indexOf('standby')>=0)return 'Standby';
  if(n==='alt'||n.indexOf('alternate')>=0)return 'Alternate';
  if(n==='s w'||n==='sw'||n.indexOf('swing')>=0)return 'Swing';
  if(n==='e c'||n==='ec'||n.indexOf('emergency')>=0)return 'Emergency cover';
  if(n==='t r'||n==='tr'||n.indexOf('temporary')>=0)return 'Temporary replacement';
  if(n.indexOf('special')>=0)return 'Special appearance';
  return v.replace(/^\*+\s*/,'').replace(/\s+/g,' ');
}
function personName(id){var p=by(db.people,id);return p?p.name:'Unknown';}

function load(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','theatre-data.json?v=fun4',true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      if(xhr.status>=200&&xhr.status<300){
        try{db=JSON.parse(xhr.responseText);buildIndexes();go('home',null,true);}
        catch(e){showError('Could not parse theatre-data.json',e.message);}
      }else showError('Could not load theatre-data.json','HTTP status '+xhr.status+'.');
    }
  };
  xhr.onerror=function(){showError('Could not load theatre-data.json','Network error.');};
  xhr.send();
}
function showError(t,m){document.getElementById('app').innerHTML='<main class="wrap"><section class="card"><h1>'+esc(t)+'</h1><p class="muted">'+esc(m)+'</p></section></main>';}

function buildIndexes(){
  var apps=db.appearances||[], perfs=db.performances||{}, i,a,p,r,k,prodKey;
  idx={perfApps:{},personApps:{},roleApps:{},showPerfs:{},venuePerfs:{},coverPerf:{},personPerfSets:{},personRoleSets:{},personShowSets:{},showPeople:{},searchText:{},creativeByPerf:{},creativeByPerson:{},allRolesByName:{}};
  for(i=0;i<apps.length;i++){
    a=apps[i];p=by(perfs,a.performanceId);r=by(db.roles,a.roleId);
    if(!idx.perfApps[a.performanceId])idx.perfApps[a.performanceId]=[];
    idx.perfApps[a.performanceId].push(a);
    if(!idx.personApps[a.personId])idx.personApps[a.personId]=[];
    idx.personApps[a.personId].push(a);
    if(!idx.roleApps[a.roleId])idx.roleApps[a.roleId]=[];
    idx.roleApps[a.roleId].push(a);
    if(a.coverType||a.appearanceType==='swing')idx.coverPerf[a.performanceId]=true;
    if(p){
      if(!idx.personPerfSets[a.personId])idx.personPerfSets[a.personId]={};
      idx.personPerfSets[a.personId][a.performanceId]=true;
      if(!idx.personShowSets[a.personId])idx.personShowSets[a.personId]={};
      idx.personShowSets[a.personId][p.showId]=true;
      if(!idx.showPeople[p.showId])idx.showPeople[p.showId]={};
      idx.showPeople[p.showId][a.personId]=true;
    }
    if(p&&r){
      if(!idx.personRoleSets[a.personId])idx.personRoleSets[a.personId]={};
      prodKey=String(p.showId)+'|'+norm(p.type||'')+'|'+roleNorm(r.name||a.roleRaw||'');
      idx.personRoleSets[a.personId][prodKey]=true;
      k=String(r.showId)+'|'+roleNorm(r.name);
      if(!idx.allRolesByName[k])idx.allRolesByName[k]={roleName:r.name,showId:r.showId,apps:[]};
      idx.allRolesByName[k].apps.push(a);
    }
  }
  var ps=vals(perfs);
  for(i=0;i<ps.length;i++){
    p=ps[i];
    if(!idx.showPerfs[p.showId])idx.showPerfs[p.showId]=[];
    idx.showPerfs[p.showId].push(p);
    if(!idx.venuePerfs[p.venueId])idx.venuePerfs[p.venueId]=[];
    idx.venuePerfs[p.venueId].push(p);
    idx.searchText[p.id]=norm(showOf(p)+' '+venueOf(p)+' '+(p.type||'')+' '+(p.time||'')+' '+(p.notes||'')+' '+sourceCast(p));
  }
  var cr=db.creativeCredits||[], c;
  for(i=0;i<cr.length;i++){
    c=cr[i];
    if(!idx.creativeByPerf[c.performanceId])idx.creativeByPerf[c.performanceId]=[];
    idx.creativeByPerf[c.performanceId].push(c);
    if(!idx.creativeByPerson[c.personId])idx.creativeByPerson[c.personId]=[];
    idx.creativeByPerson[c.personId].push(c);
  }
}
function stat(personId,currentPerfId){
  var ps=idx.personPerfSets[personId]||{}, rs=idx.personRoleSets[personId]||{}, ss=idx.personShowSets[personId]||{};
  var pc=keys(ps).length, rc=keys(rs).length, sc=keys(ss).length;
  var other=ps[currentPerfId]?pc-1:pc;
  if(other<0)other=0;
  return {other:other,roles:rc,shows:sc,perfs:pc};
}
function personButton(personId,currentPerfId){
  var s=stat(personId,currentPerfId), rw=s.roles===1?'role':'roles', tw=s.other===1?'other time':'other times';
  return '<button class="nameBtn" onclick="TD.openPerson('+personId+')">'+esc(personName(personId))+'</button><span class="personStats"> '+s.other+' '+tw+' / '+s.roles+' '+rw+'</span>';
}
function shell(inner){
  return '<div class="topbar"><div class="topin"><button class="brand" onclick="TD.go(\'home\',null)">Theatre Diary</button><div class="nav">'+
    '<button class="btn" onclick="TD.go(\'home\',null)">Home</button><button class="btn" onclick="TD.back()">Back</button><button class="btn" onclick="TD.forward()">Forward</button>'+
    '<button class="btn" onclick="TD.go(\'people\',null)">People</button><button class="btn" onclick="TD.go(\'shows\',null)">Shows</button><button class="btn" onclick="TD.go(\'roles\',null)">Roles</button>'+
    '<button class="btn" onclick="TD.go(\'covers\',null)">Covers</button><button class="btn" onclick="TD.go(\'stats\',null)">Stats</button><button class="btn" onclick="TD.go(\'issues\',null)">Issues</button>'+
    '<button class="btn" onclick="TD.toggleDensity()">'+(state.density==='compact'?'Comfy':'Compact')+'</button><button class="btn" onclick="TD.random()">Random</button>'+
    '</div></div></div>'+inner+(state.panel?renderPanel(state.panel):'');
}
function render(){document.body.className=state.density==='compact'?'compact':'';var h=''; if(state.view==='home')h=home(); else if(state.view==='perf')h=perfPage(state.id); else if(state.view==='person')h=personPage(state.id); else if(state.view==='show')h=showPage(state.id); else if(state.view==='venue')h=venuePage(state.id); else if(state.view==='people')h=peoplePage(); else if(state.view==='shows')h=showsPage(); else if(state.view==='roles')h=rolesPage(); else if(state.view==='role')h=rolePage(state.id); else if(state.view==='covers')h=coversPage(); else if(state.view==='stats')h=statsPage(); else if(state.view==='issues')h=issuesPage(); else if(state.view==='edits')h=editsPage(); else h=home(); document.getElementById('app').innerHTML=shell(h);}

function go(v,id,replace){state.view=v;state.id=id;state.panel=null;if(!replace){if(state.hIndex<state.history.length-1)state.history=state.history.slice(0,state.hIndex+1);state.history.push({v:v,id:id});state.hIndex=state.history.length-1;}else if(!state.history.length){state.history.push({v:v,id:id});state.hIndex=0;}render();setTimeout(function(){window.scrollTo(0,0);},0);}
function back(){if(state.hIndex>0){state.hIndex--;var h=state.history[state.hIndex];state.view=h.v;state.id=h.id;state.panel=null;render();setTimeout(function(){window.scrollTo(0,0);},0);}}
function forward(){if(state.hIndex<state.history.length-1){state.hIndex++;var h=state.history[state.hIndex];state.view=h.v;state.id=h.id;state.panel=null;render();setTimeout(function(){window.scrollTo(0,0);},0);}}

function sortedPerformances(){
  var ps=vals(db.performances);
  ps.sort(function(a,b){return state.sort==='old'?String(a.date).localeCompare(String(b.date)):String(b.date).localeCompare(String(a.date));});
  return ps;
}
function home(){
  var ps=sortedPerformances(), years={}, types={}, i,p,filtered=[], q=norm(state.q), hay;
  for(i=0;i<ps.length;i++){years[yearOf(ps[i].date)]=1;types[ps[i].type||'Unknown']=1;}
  for(i=0;i<ps.length;i++){
    p=ps[i];
    if(state.year!=='all'&&yearOf(p.date)!==state.year)continue;
    if(state.type!=='all'&&(p.type||'Unknown')!==state.type)continue;
    if(state.cover&&!idx.coverPerf[p.id])continue;
    if(q){hay=idx.searchText[p.id]; if(hay.indexOf(q)===-1)continue;}
    filtered.push(p);
  }
  var out='<main class="wrap"><section class="hero"><h1>Theatre Attendance Diary</h1><p class="muted">'+filtered.length+' performances · '+vals(db.shows).length+' shows · '+vals(db.people).length+' people. Now with more portals and fewer iPhone tantrums.</p>'+
    '<div class="toolbar"><input class="input" value="'+esc(state.q)+'" placeholder="Search show, venue, cast, notes..." oninput="TD.setQ(this.value)">'+
    '<select class="select" onchange="TD.setYear(this.value)"><option value="all">All years</option>'+opts(years,state.year,true)+'</select>'+
    '<select class="select" onchange="TD.setType(this.value)"><option value="all">All types</option>'+opts(types,state.type,false)+'</select>'+
    '<select class="select" onchange="TD.setSort(this.value)"><option value="new" '+(state.sort==='new'?'selected':'')+'>Newest first</option><option value="old" '+(state.sort==='old'?'selected':'')+'>Oldest first</option></select>'+
    '<button class="btn" onclick="TD.toggleCovers()">'+(state.cover?'All performances':'Only with covers')+'</button></div></section><section class="grid">';
  var n=Math.min(filtered.length,state.limit);
  for(i=0;i<n;i++)out+=perfCard(filtered[i]);
  out+='</section>';
  if(filtered.length>state.limit)out+='<button class="btn loadMore" onclick="TD.more()">Load more</button>';
  return out+'</main>';
}
function opts(obj,sel,rev){var a=keys(obj),out='',i;a.sort();if(rev)a.reverse();for(i=0;i<a.length;i++)if(a[i])out+='<option value="'+esc(a[i])+'" '+(a[i]===sel?'selected':'')+'>'+esc(a[i])+'</option>';return out;}
function perfCard(p){
  var apps=idx.perfApps[p.id]||[], preview=[], covers=0,i,a,person,role;
  for(i=0;i<apps.length;i++){a=apps[i];if(a.coverType||a.appearanceType==='swing')covers++; if(preview.length<3&&a.appearanceType!=='ensemble'){person=by(db.people,a.personId);role=by(db.roles,a.roleId);preview.push((person?person.name:'Unknown')+(role?' as '+role.name:''));}}

  rows.sort(function(a,b){return String(b.perf.date).localeCompare(String(a.perf.date));});
  var out='<main class="wrap"><section class="hero"><h1>'+esc(o?o.roleName:'Role')+'</h1><p class="muted">'+esc(show?show.title:'')+' · '+rows.length+' appearances · '+keys(personSet).length+' people.</p></section><section class="card"><div class="list">';
  for(i=0;i<rows.length;i++)out+='<div class="row"><button class="linkish" onclick="TD.go(\'person\','+rows[i].person.id+')">'+esc(rows[i].person.name)+'</button><div class="tiny"><button class="linkish" onclick="TD.go(\'perf\','+rows[i].perf.id+')">'+esc(fmtDate(rows[i].perf.date))+'</button> · '+esc(venueOf(rows[i].perf))+(rows[i].coverName(rows[i].a.coverLabel||rows[i].a.coverType)?' · '+esc(coverName(rows[i].a.coverLabel||rows[i].a.coverType)):'')+'</div></div>';
  return out+'</div></section></main>';
}
function coversPage(){
  var apps=db.appearances||[], rows=[],i,a,p,r,person;
  for(i=0;i<apps.length;i++){a=apps[i];if(!(a.coverType||a.appearanceType==='swing'))continue;p=by(db.performances,a.performanceId);r=by(db.roles,a.roleId);person=by(db.people,a.personId);if(p&&person)rows.push({a:a,p:p,r:r,person:person});}
  rows.sort(function(a,b){return String(b.p.date).localeCompare(String(a.p.date));});
  var out='<main class="wrap"><section class="hero"><h1>Covers & Special Appearances</h1><p class="muted">'+rows.length+' cover/swing/special appearance lines.</p></section><section class="card tableWrap"><table class="table"><thead><tr><th>Date</th><th>Show</th><th>Person</th><th>Role</th><th>Cover</th></tr></thead><tbody>';
  for(i=0;i<Math.min(rows.length,600);i++)out+='<tr><td><button class="linkish" onclick="TD.go(\'perf\','+rows[i].p.id+')">'+esc(fmtDate(rows[i].p.date))+'</button></td><td>'+esc(showOf(rows[i].p))+'</td><td><button class="linkish" onclick="TD.go(\'person\','+rows[i].person.id+')">'+esc(rows[i].person.name)+'</button></td><td>'+esc(rows[i].r?rows[i].r.name:'')+'</td><td><span class="chip cover">'+esc(coverName(rows[i].a.coverLabel||rows[i].a.coverType||rows[i].a.appearanceType))+'</span></td></tr>';
  return out+'</tbody></table></section></main>';
}
function statsPage(){
  var perfs=vals(db.performances), years={}, types={}, i,p,topShows=[],sid;
  for(i=0;i<perfs.length;i++){p=perfs[i];years[yearOf(p.date)]=(years[yearOf(p.date)]||0)+1;types[p.type||'Unknown']=(types[p.type||'Unknown']||0)+1;}
  for(sid in idx.showPerfs)if(Object.prototype.hasOwnProperty.call(idx.showPerfs,sid))topShows.push({id:sid,n:idx.showPerfs[sid].length,title:(by(db.shows,sid)||{}).title});
  topShows.sort(function(a,b){return b.n-a.n||a.title.localeCompare(b.title);});
  return '<main class="wrap"><section class="hero"><h1>Stats</h1><div class="statGrid"><div class="stat"><div class="num">'+perfs.length+'</div><div class="lab">performances</div></div><div class="stat"><div class="num">'+vals(db.shows).length+'</div><div class="lab">shows</div></div><div class="stat"><div class="num">'+vals(db.people).length+'</div><div class="lab">people</div></div><div class="stat"><div class="num">'+keys(idx.coverPerf).length+'</div><div class="lab">performances with covers</div></div></div></section><div class="split"><section class="card"><h2>Most Seen Shows</h2>'+simpleRows(topShows,'show')+'</section><aside class="card"><h2>By Year</h2>'+countRows(years,true)+'<div class="section"><h2>By Type</h2>'+countRows(types,false)+'</div></aside></div></main>';
}
function simpleRows(rows,type){var out='<div class="list">',i;for(i=0;i<Math.min(rows.length,15);i++)out+='<div class="row"><button class="linkish" onclick="TD.go(\''+type+'\','+rows[i].id+')">'+esc(rows[i].title)+'</button><div class="tiny">'+rows[i].n+' performances</div></div>';return out+'</div>';}
function countRows(obj,rev){var a=[],k,i,out='<div class="list">';for(k in obj)if(Object.prototype.hasOwnProperty.call(obj,k))a.push({k:k,n:obj[k]});a.sort(function(a,b){return rev?String(b.k).localeCompare(String(a.k)):b.n-a.n;});for(i=0;i<a.length;i++)out+='<div class="row"><strong>'+esc(a[i].k)+'</strong><div class="tiny">'+a[i].n+' performances</div></div>';return out+'</div>';}
function issuesPage(){
  var suspiciousPeople=[], dupes={}, suspiciousRoles=[], missing=[], swingCount=0, trackRaw=0, i,p,person,r,role,a,apps=db.appearances||[], perfs=vals(db.performances);
  var people=vals(db.people);
  for(i=0;i<people.length;i++){
    person=people[i];
    var nm=person.name||'';
    if(nm.indexOf(';')>=0 || nm.indexOf(':')>=0 || /\/.*[A-Z]/.test(nm) || /Dramaturgy|Fight|Intimacy|Props|Design|Original Music|Movement/i.test(nm)) suspiciousPeople.push(person);
    var key=norm(nm.replace(/\./g,'').replace(/["“”]/g,'').replace(/-/g,' '));
    if(key){if(!dupes[key])dupes[key]=[];dupes[key].push(person);}
  }
  var dupRows=[],k;
  for(k in dupes)if(Object.prototype.hasOwnProperty.call(dupes,k)&&dupes[k].length>1)dupRows.push(dupes[k]);
  var roles=vals(db.roles);
  for(i=0;i<roles.length;i++){
    role=roles[i]; var rn=role.name||'';
    if(/\bu\/s\b|\bs\/b\b|\be\/c\b|\bt\/r\b|\balt\b|\*/i.test(rn)) suspiciousRoles.push(role);
  }
  for(i=0;i<apps.length;i++){a=apps[i]; if(a.appearanceType==='swing')swingCount++; var rr=by(db.roles,a.roleId); if(rr&&/track|swing/i.test(rr.name||''))trackRaw++;}
  for(i=0;i<perfs.length;i++){p=perfs[i]; if(!p.date||!p.showId||!p.venueId||!(idx.perfApps[p.id]||[]).length)missing.push(p);}
  var out='<main class="wrap"><section class="hero"><h1>Data Issues</h1><p class="muted">Quiet flags for cleanup. These do not mean the dashboard is broken; they are places where the parser may be wearing tap shoes on a marble floor.</p><div class="statGrid">'+
    '<div class="stat"><div class="num">'+suspiciousPeople.length+'</div><div class="lab">suspicious people/creative names</div></div>'+
    '<div class="stat"><div class="num">'+dupRows.length+'</div><div class="lab">likely duplicate-name clusters</div></div>'+
    '<div class="stat"><div class="num">'+suspiciousRoles.length+'</div><div class="lab">roles with cover notation</div></div>'+
    '<div class="stat"><div class="num">'+swingCount+'</div><div class="lab">swing/special parsed lines</div></div></div></section>'+
    '<div class="split"><section class="card"><h2>Suspicious People / Creative Names</h2>'+issuePeopleList(suspiciousPeople)+'<div class="section"><h2>Possible Duplicate People</h2>'+dupeList(dupRows)+'</div></section>'+
    '<aside class="card"><h2>Roles with Notation</h2>'+issueRolesList(suspiciousRoles)+'<div class="section"><h2>Missing / Structural Flags</h2><p class="muted">'+missing.length+' performances with missing date, show, venue, or parsed cast.</p><p class="muted">'+trackRaw+' appearance lines mention track/swing language.</p></div></aside></div></main>';
  return out;
}
function issuePeopleList(rows){var out='<div class="list">',i;if(!rows.length)return'<p class="muted">None found.</p>';for(i=0;i<Math.min(rows.length,80);i++)out+='<div class="row"><button class="linkish" onclick="TD.go(\'person\','+rows[i].id+')">'+esc(rows[i].name)+'</button><div class="tiny">May need splitting, aliasing, or credit-label cleanup.</div></div>';return out+'</div>';}
function dupeList(rows){var out='<div class="list">',i,j,names;if(!rows.length)return'<p class="muted">None found.</p>';rows.sort(function(a,b){return a[0].name.localeCompare(b[0].name);});for(i=0;i<Math.min(rows.length,60);i++){names=[];for(j=0;j<rows[i].length;j++)names.push('<button class="linkish" onclick="TD.go(\'person\','+rows[i][j].id+')">'+esc(rows[i][j].name)+'</button>');out+='<div class="row">'+names.join(' / ')+'<div class="tiny">Likely alias/duplicate cluster.</div></div>';}return out+'</div>';}
function issueRolesList(rows){var out='<div class="list">',i,show;if(!rows.length)return'<p class="muted">None found.</p>';for(i=0;i<Math.min(rows.length,80);i++){show=by(db.shows,rows[i].showId);out+='<div class="row"><strong>'+esc(rows[i].name)+'</strong><div class="tiny">'+esc(show?show.title:'')+'</div></div>';}return out+'</div>';}

function editsPage(){return '<main class="wrap"><section class="hero"><h1>Edits</h1><p class="muted">These edits live in this browser/device. Export them before replacing devices or clearing data.</p><div class="toolbar"><button class="btn" onclick="TD.exportEdits()">Copy edits JSON</button><button class="btn" onclick="TD.downloadEdits()">Download edits JSON</button><button class="btn" onclick="TD.importEdits()">Import pasted JSON</button></div></section><section class="card"><h2>Current edits</h2><pre>'+esc(JSON.stringify(edits,null,2))+'</pre></section></main>';}

function readEdits(){try{return JSON.parse(localStorage.getItem('theatreDiaryEdits')||'{}');}catch(e){return{};}}
function saveEdits(){try{localStorage.setItem('theatreDiaryEdits',JSON.stringify(edits));}catch(e){}}
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t);else window.prompt('Copy this:',t);}
function copyHtml(html,plain){if(navigator.clipboard&&window.ClipboardItem){try{var item=new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})});navigator.clipboard.write([item]);return;}catch(e){}}copyText(plain);}
function copyPerf(id,mode){
  var p=by(db.performances,id), apps=(idx.perfApps[id]||[]).slice(), i,a,r,person,lines=[],plain,html;
  if(!p)return;
  apps.sort(function(a,b){return(a.displayOrder||0)-(b.displayOrder||0);});
  lines.push(showOf(p));lines.push(fmtDate(p.date)+' · '+venueOf(p));lines.push('');
  for(i=0;i<apps.length;i++){a=apps[i];r=by(db.roles,a.roleId);person=by(db.people,a.personId);if(a.appearanceType==='ensemble')continue;lines.push((r?r.name:'')+' — '+(person?person.name:'')+(coverName(a.coverLabel||a.coverType)?' ['+coverName(a.coverLabel||a.coverType)+']':''));}
  var ens=[];for(i=0;i<apps.length;i++){a=apps[i];if(a.appearanceType==='ensemble')ens.push(personName(a.personId));}
  if(ens.length){lines.push('');lines.push('Ensemble: '+ens.join(', '));}
  plain= mode==='cast'?lines.slice(3).join('\n'):lines.join('\n');
  html='<h2>'+esc(showOf(p))+'</h2><p>'+esc(fmtDate(p.date)+' · '+venueOf(p))+'</p><ul>';
  for(i=3;i<lines.length;i++)html+='<li>'+esc(lines[i]).replace(/\[([^\]]+)\]/g,'<strong>[$1]</strong>')+'</li>';
  html+='</ul>';
  if(mode==='html')copyHtml(html,plain);else copyText(plain);
}
function saveField(id,field,val){if(!edits[String(id)])edits[String(id)]={};edits[String(id)][field]=val;saveEdits();}
function exportEdits(){copyText(JSON.stringify(edits,null,2));alert('Edits JSON copied.');}
function downloadEdits(){var blob=new Blob([JSON.stringify(edits,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='theatre-diary-edits.json';a.click();}
function importEdits(){var t=window.prompt('Paste edits JSON');if(!t)return;try{edits=JSON.parse(t);saveEdits();render();}catch(e){alert('Could not parse JSON.');}}

window.TD={
  go:function(v,id){go(v,id,false)},back:back,forward:forward,
  setQ:function(v){state.q=v;state.limit=72;render()},setYear:function(v){state.year=v;state.limit=72;render()},setType:function(v){state.type=v;state.limit=72;render()},setSort:function(v){state.sort=v;render()},
  toggleCovers:function(){state.cover=!state.cover;state.limit=72;render()},more:function(){state.limit+=72;render()},
  openPerson:function(id){state.panel=id;render()},closePerson:function(){state.panel=null;render()},
  random:function(){var ps=vals(db.performances),p=ps[Math.floor(Math.random()*ps.length)];go('perf',p.id,false)},
  saveField:saveField,exportEdits:exportEdits,downloadEdits:downloadEdits,importEdits:importEdits,copyPerf:copyPerf,
  setPeopleMode:function(m){state.peopleMode=m;render()},
  toggleDensity:function(){state.density=state.density==='compact'?'comfy':'compact';localStorage.setItem('theatreDiaryDensity',state.density);render()}
};
load();
})();
</script>
