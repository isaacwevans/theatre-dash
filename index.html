<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#21130f">
  <title>Theatre Diary</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;width:100%;overflow-x:hidden}
    body{
      background:radial-gradient(circle at top left,#5a321f 0,#21130f 42%,#120d0b 100%);
      color:#f8efe2;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .boot{
      max-width:720px;
      margin:0 auto;
      padding:22px 16px;
    }
    .boot-card{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.075);
      border-radius:20px;
      padding:18px;
      box-shadow:0 18px 60px rgba(0,0,0,.25);
    }
    .boot-title{
      font-family:Georgia,serif;
      font-size:34px;
      font-weight:900;
      line-height:1;
      margin:0 0 8px;
    }
    .boot-small{
      color:rgba(248,239,226,.72);
      line-height:1.4;
      margin:8px 0 0;
    }
    .boot-steps{
      display:grid;
      gap:8px;
      margin-top:14px;
      font-size:14px;
    }
    .boot-step{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.16);
      border-radius:14px;
      padding:9px 10px;
    }
    .ok{color:#bff0c7}
    .warn{color:#ffe3a6}
    .bad{color:#ffb3a6}
    code{color:#ffe3a6}
    a{color:#ffe3a6}
  </style>
</head>
<body>
  <div id="app">
    <main class="boot">
      <section class="boot-card">
        <h1 class="boot-title">Theatre Diary</h1>
        <p class="boot-small">Starting the dashboard…</p>
        <div class="boot-steps">
          <div id="boot-js" class="boot-step warn">1. Waiting for JavaScript startup test.</div>
          <div id="boot-app" class="boot-step warn">2. Waiting for inline dashboard app.</div>
          <div id="boot-data" class="boot-step warn">3. Waiting for <code>theatre-data.json</code>.</div>
        </div>
        <p class="boot-small">
          This version does not use an external <code>app.js</code> file, because iPhone Safari was refusing to run it.
        </p>
      </section>
    </main>
  </div>

  <script>
    (function(){
      var el = document.getElementById('boot-js');
      if (el) {
        el.className = 'boot-step ok';
        el.innerHTML = '1. JavaScript startup test passed.';
      }
    })();
  </script>

  <script>

(function(){
  var boot = document.getElementById('boot-app');
  if (boot) {
    boot.className = 'boot-step ok';
    boot.innerHTML = '2. <code>app.js</code> loaded. Building dashboard...';
  }

  window.onerror = function(msg, src, line, col, err) {
    var el = document.getElementById('app');
    if (el) {
      el.innerHTML = '<main class="wrap"><section class="card"><h1>Dashboard error</h1><p class="muted">app.js loaded, but crashed while rendering.</p><pre>' + esc(String(msg)) + '\nLine ' + line + '</pre></section></main>';
    }
  };

  var css = [
    '*{box-sizing:border-box}',
    'html,body{margin:0;min-height:100%;width:100%;overflow-x:hidden}',
    'body{background:radial-gradient(circle at top left,#5b321f 0,#21130f 42%,#110c0a 100%);color:#fff5e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}',
    'button,input,select,textarea{font:inherit}',
    'button{cursor:pointer}',
    '.topbar{position:sticky;top:0;z-index:50;background:rgba(18,12,10,.96);border-bottom:1px solid rgba(255,255,255,.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}',
    '.topin{max-width:1120px;margin:0 auto;padding:8px 12px;display:flex;align-items:center;gap:8px}',
    '.brand{border:0;background:transparent;color:#fff5e8;font-family:Georgia,serif;font-weight:900;font-size:21px;white-space:nowrap;padding:8px;border-radius:12px}',
    '.brand:before{content:"🎭";font-family:Apple Color Emoji,Segoe UI Emoji;margin-right:8px;font-size:17px}',
    '.actions{margin-left:auto;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:60vw}',
    '.btn{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff5e8;border-radius:999px;padding:7px 10px;white-space:nowrap}',
    '.btn:hover{background:rgba(255,255,255,.14)}',
    '.wrap{max-width:1120px;margin:0 auto;padding:14px 12px 40px;width:100%}',
    '.hero{border:1px solid rgba(255,255,255,.14);background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.045));border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 20px 70px rgba(0,0,0,.22)}',
    'h1{font-family:Georgia,serif;font-size:34px;line-height:1.02;margin:0 0 6px}',
    'h2{font-family:Georgia,serif;font-size:24px;margin:0 0 10px}',
    'h3{font-family:Georgia,serif;font-size:19px;margin:0 0 8px}',
    '.muted{color:rgba(255,245,232,.68)}',
    '.tiny{font-size:12px;color:rgba(255,245,232,.62)}',
    '.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}',
    '.input,.select,.textarea{border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.18);color:#fff5e8;border-radius:14px;padding:9px 10px;min-height:38px}',
    '.input{flex:1 1 260px}',
    '.select{flex:0 0 auto}',
    '.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:10px}',
    '.card{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.075);border-radius:18px;padding:12px;min-width:0;box-shadow:0 14px 40px rgba(0,0,0,.16)}',
    '.perfCard{cursor:pointer;transition:transform .12s ease,background .12s ease}',
    '.perfCard:hover{transform:translateY(-1px);background:rgba(255,255,255,.11)}',
    '.showTitle{font-family:Georgia,serif;font-weight:900;font-size:22px;line-height:1.04;margin-bottom:4px}',
    '.meta{font-size:13px;color:rgba(255,245,232,.7);line-height:1.3}',
    '.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}',
    '.chip{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.17);border-radius:999px;padding:4px 7px;font-size:12px;color:#ffe8b9}',
    '.cover{border-color:rgba(255,205,112,.45);background:rgba(255,191,73,.14);color:#ffe2a0;font-weight:800}',
    '.split{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:12px;align-items:start}',
    '.section{margin-top:12px}',
    '.castLine{display:grid;grid-template-columns:minmax(110px,210px) minmax(0,1fr);gap:8px;align-items:start;border-bottom:1px solid rgba(255,255,255,.08);padding:6px 0}',
    '.role{font-weight:800;color:#ffdf9f;line-height:1.2}',
    '.nameBtn{border:0;background:transparent;color:#fff5e8;text-align:left;padding:0;font-weight:800;text-decoration:underline;text-decoration-color:rgba(255,255,255,.18);text-underline-offset:3px}',
    '.personStats{font-size:12px;color:rgba(255,245,232,.58);margin-left:4px;white-space:nowrap}',
    '.ensemble{display:flex;gap:6px;flex-wrap:wrap}',
    '.ensChip{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.065);border-radius:999px;padding:5px 8px;font-size:13px}',
    '.panel{position:fixed;right:14px;top:64px;width:min(390px,calc(100vw - 28px));max-height:calc(100vh - 82px);overflow:auto;z-index:80;background:#20120e;border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:14px;box-shadow:0 30px 90px rgba(0,0,0,.55)}',
    '.overlayClose{float:right}',
    '.list{display:grid;gap:7px}',
    '.row{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.055);border-radius:14px;padding:8px}',
    '.linkish{border:0;background:transparent;color:#ffe2a0;text-align:left;padding:0;text-decoration:underline;text-decoration-color:rgba(255,226,160,.3);text-underline-offset:3px}',
    '.textarea{width:100%;min-height:110px;resize:vertical}',
    'pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.12);padding:10px;border-radius:14px;overflow:auto}',
    '.table{width:100%;border-collapse:collapse;font-size:14px}',
    '.table th,.table td{border-bottom:1px solid rgba(255,255,255,.1);padding:7px;text-align:left;vertical-align:top}',
    '.loadMore{display:block;margin:14px auto 0}',
    '@media(max-width:720px){.topin{padding:7px 8px}.brand{font-size:18px;padding:7px 5px}.actions{max-width:calc(100vw - 140px);gap:5px}.btn{padding:6px 8px;font-size:13px}.wrap{padding:10px 8px 32px}.hero{border-radius:18px;padding:12px}h1{font-size:27px}.grid{grid-template-columns:1fr;gap:8px}.card{border-radius:15px;padding:10px}.split{display:block}.castLine{grid-template-columns:1fr;gap:2px;padding:6px 0}.role{font-size:14px}.nameBtn{font-size:16px}.panel{left:8px;right:8px;top:auto;bottom:8px;width:auto;max-height:76vh;border-radius:18px}.input{flex-basis:100%;min-width:0}.select{flex:1 1 135px;min-width:0}.showTitle{font-size:20px}.personStats{display:inline;font-size:11px}.toolbar{gap:6px}.ensChip{font-size:12px;padding:5px 7px}}'
  ].join('\n');
  var style = document.createElement('style');
  style.appendChild(document.createTextNode(css));
  document.head.appendChild(style);

  var db = null;
  var state = { view:'home', id:null, query:'', year:'all', type:'all', onlyCovers:false, limit:60, history:[], hIndex:-1, panelPerson:null };
  var indexes = null;
  var localEdits = readEdits();

  function esc(s) {
    s = s == null ? '' : String(s);
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function norm(s) {
    return (s == null ? '' : String(s)).toLowerCase().replace(/[\u2018\u2019]/g,"'").replace(/[^a-z0-9]+/g,' ').replace(/^\s+|\s+$/g,'');
  }
  function roleNorm(s) {
    s = norm(s);
    s = s.replace(/\bensemble\b/g,'').replace(/\btrack\b/g,'').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'');
    return s || 'ensemble';
  }
  function values(obj) {
    var arr = [], k;
    for (k in obj) if (Object.prototype.hasOwnProperty.call(obj,k)) arr.push(obj[k]);
    return arr;
  }
  function byId(map,id) { return map && map[String(id)] ? map[String(id)] : null; }
  function showOf(p) { var s = byId(db.shows,p.showId); return s ? s.title : 'Untitled'; }
  function venueOf(p) { var v = byId(db.venues,p.venueId); return v ? v.name + (v.city ? ' · ' + v.city : '') : ''; }
  function fmtDate(iso) {
    if (!iso) return '';
    var parts = String(iso).split('-');
    if (parts.length !== 3) return iso;
    var d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
    var mos = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return mos[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  }
  function yearOf(iso) { return iso ? String(iso).slice(0,4) : ''; }

  function markDataReachable() {
    var el = document.getElementById('boot-data');
    if (el) {
      el.className = 'boot-step ok';
      el.innerHTML = '3. <code>theatre-data.json</code> loaded by the app.';
    }
  }

  function loadData() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET','theatre-data.json?v=20260507-safe2',true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState === 4) {
        if (xhr.status >= 200 && xhr.status < 300) {
          markDataReachable();
          try {
            db = JSON.parse(xhr.responseText);
            buildIndexes();
            go('home', null, true);
          } catch(e) {
            showError('Could not parse theatre-data.json', e.message);
          }
        } else {
          showError('Could not load theatre-data.json', 'HTTP status ' + xhr.status + '. It needs to be in the same folder as index.html and app.js.');
        }
      }
    };
    xhr.onerror = function(){ showError('Network error', 'Could not load theatre-data.json.'); };
    xhr.send();
  }

  function showError(title, msg) {
    document.getElementById('app').innerHTML = '<main class="wrap"><section class="card"><h1>'+esc(title)+'</h1><p class="muted">'+esc(msg)+'</p></section></main>';
  }

  function buildIndexes() {
    var apps = db.appearances || [];
    var perfs = db.performances || {};
    var personAppearances = {};
    var perfApps = {};
    var showPerfs = {};
    var venuePerfs = {};
    var roleApps = {};
    var coverPerf = {};
    var peoplePerfSets = {};
    var peopleRoleSets = {};
    var i,a,p,key,role,productionKey;

    for (i=0;i<apps.length;i++) {
      a = apps[i];
      if (!personAppearances[a.personId]) personAppearances[a.personId] = [];
      personAppearances[a.personId].push(a);
      if (!perfApps[a.performanceId]) perfApps[a.performanceId] = [];
      perfApps[a.performanceId].push(a);
      if (!roleApps[a.roleId]) roleApps[a.roleId] = [];
      roleApps[a.roleId].push(a);
      if (a.coverType || a.appearanceType === 'swing') coverPerf[a.performanceId] = true;

      p = byId(perfs,a.performanceId);
      role = byId(db.roles,a.roleId);
      if (p && role) {
        if (!peoplePerfSets[a.personId]) peoplePerfSets[a.personId] = {};
        peoplePerfSets[a.personId][a.performanceId] = true;
        if (!peopleRoleSets[a.personId]) peopleRoleSets[a.personId] = {};
        productionKey = String(p.showId) + '|' + norm(p.type || '') + '|' + roleNorm(role.name || a.roleRaw || '');
        peopleRoleSets[a.personId][productionKey] = true;
      }
    }
    var ps = values(perfs);
    for (i=0;i<ps.length;i++) {
      p = ps[i];
      if (!showPerfs[p.showId]) showPerfs[p.showId] = [];
      showPerfs[p.showId].push(p);
      if (!venuePerfs[p.venueId]) venuePerfs[p.venueId] = [];
      venuePerfs[p.venueId].push(p);
    }
    indexes = {
      personAppearances: personAppearances,
      perfApps: perfApps,
      showPerfs: showPerfs,
      venuePerfs: venuePerfs,
      roleApps: roleApps,
      coverPerf: coverPerf,
      peoplePerfSets: peoplePerfSets,
      peopleRoleSets: peopleRoleSets
    };
  }

  function personStats(personId, currentPerfId) {
    var perfSet = indexes.peoplePerfSets[personId] || {};
    var roleSet = indexes.peopleRoleSets[personId] || {};
    var perfCount = 0, k;
    for (k in perfSet) if (Object.prototype.hasOwnProperty.call(perfSet,k)) perfCount++;
    var roleCount = 0;
    for (k in roleSet) if (Object.prototype.hasOwnProperty.call(roleSet,k)) roleCount++;
    var other = perfSet[currentPerfId] ? perfCount - 1 : perfCount;
    return {other: other < 0 ? 0 : other, roles: roleCount};
  }

  function personLabel(personId,currentPerfId) {
    var person = byId(db.people,personId);
    var st = personStats(personId,currentPerfId);
    var roleWord = st.roles === 1 ? 'role' : 'roles';
    var timeWord = st.other === 1 ? 'other time' : 'other times';
    return '<button class="nameBtn" onclick="TD.openPerson('+personId+')">'+esc(person ? person.name : 'Unknown')+'</button><span class="personStats"> '+st.other+' '+timeWord+' / '+st.roles+' '+roleWord+'</span>';
  }

  function go(view,id,replace) {
    state.view = view;
    state.id = id;
    state.panelPerson = null;
    if (!replace) {
      var item = {view:view,id:id};
      if (state.hIndex < state.history.length - 1) state.history = state.history.slice(0,state.hIndex+1);
      state.history.push(item);
      state.hIndex = state.history.length - 1;
    } else if (state.history.length === 0) {
      state.history.push({view:view,id:id});
      state.hIndex = 0;
    }
    render();
  }

  function navBack() {
    if (state.hIndex > 0) {
      state.hIndex--;
      var h = state.history[state.hIndex];
      state.view = h.view; state.id = h.id; state.panelPerson = null; render();
    }
  }
  function navForward() {
    if (state.hIndex < state.history.length - 1) {
      state.hIndex++;
      var h = state.history[state.hIndex];
      state.view = h.view; state.id = h.id; state.panelPerson = null; render();
    }
  }

  function shell(inner) {
    return '<div class="topbar"><div class="topin"><button class="brand" onclick="TD.go(\'home\',null)">Theatre Diary</button><div class="actions"><button class="btn" onclick="TD.go(\'home\',null)">Home</button><button class="btn" onclick="TD.back()">Back</button><button class="btn" onclick="TD.forward()">Forward</button><button class="btn" onclick="TD.go(\'roles\',null)">Role Counts</button><button class="btn" onclick="TD.random()">Random</button></div></div></div>' + inner + (state.panelPerson ? renderPersonPanel(state.panelPerson) : '');
  }

  function render() {
    if (!db) return;
    var html = '';
    if (state.view === 'home') html = renderHome();
    else if (state.view === 'perf') html = renderPerformance(state.id);
    else if (state.view === 'person') html = renderPersonPage(state.id);
    else if (state.view === 'show') html = renderShowPage(state.id);
    else if (state.view === 'venue') html = renderVenuePage(state.id);
    else if (state.view === 'roles') html = renderRoleCounts();
    else html = renderHome();
    document.getElementById('app').innerHTML = shell(html);
  }

  function renderHome() {
    var ps = values(db.performances);
    ps.sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); });
    var years = {}, types = {}, i,p;
    for (i=0;i<ps.length;i++) { years[yearOf(ps[i].date)] = true; types[ps[i].type || 'Unknown'] = true; }
    var filtered = [];
    var q = norm(state.query);
    for (i=0;i<ps.length;i++) {
      p = ps[i];
      if (state.year !== 'all' && yearOf(p.date) !== state.year) continue;
      if (state.type !== 'all' && (p.type || 'Unknown') !== state.type) continue;
      if (state.onlyCovers && !indexes.coverPerf[p.id]) continue;
      if (q) {
        var hay = norm(showOf(p) + ' ' + venueOf(p) + ' ' + (p.type||'') + ' ' + (p.notes||'') + ' ' + ((p.source&&p.source.castNormalized)||''));
        if (hay.indexOf(q) === -1) continue;
      }
      filtered.push(p);
    }
    var yearOpts = '<option value="all">All years</option>' + optsFromKeys(years,state.year,true);
    var typeOpts = '<option value="all">All types</option>' + optsFromKeys(types,state.type,false);
    var out = '<main class="wrap"><section class="hero"><h1>Theatre Attendance Diary</h1><p class="muted">'+filtered.length+' performances from '+values(db.shows).length+' shows. Built for cross-referencing people, roles, productions, and venues.</p><div class="toolbar"><input class="input" value="'+esc(state.query)+'" placeholder="Search show, person, venue, notes..." oninput="TD.setQ(this.value)"><select class="select" onchange="TD.setYear(this.value)">'+yearOpts+'</select><select class="select" onchange="TD.setType(this.value)">'+typeOpts+'</select><button class="btn" onclick="TD.toggleCovers()">'+(state.onlyCovers?'Showing covers':'Only with covers')+'</button></div></section><section class="grid">';
    var n = Math.min(filtered.length,state.limit);
    for (i=0;i<n;i++) out += perfCard(filtered[i]);
    out += '</section>';
    if (filtered.length > state.limit) out += '<button class="btn loadMore" onclick="TD.more()">Load more</button>';
    out += '</main>';
    return out;
  }

  function optsFromKeys(obj, selected, reverse) {
    var arr = [], k, i, out='';
    for (k in obj) if (k) arr.push(k);
    arr.sort();
    if (reverse) arr.reverse();
    for (i=0;i<arr.length;i++) out += '<option value="'+esc(arr[i])+'" '+(arr[i]===selected?'selected':'')+'>'+esc(arr[i])+'</option>';
    return out;
  }

  function perfCard(p) {
    var apps = indexes.perfApps[p.id] || [];
    var preview = [], covers = 0, i,a,person,role;
    for (i=0;i<apps.length && preview.length<3;i++) {
      a = apps[i];
      if (a.appearanceType === 'ensemble') continue;
      person = byId(db.people,a.personId); role = byId(db.roles,a.roleId);
      preview.push((person?person.name:'Unknown') + (role ? ' as ' + role.name : ''));
      if (a.coverType || a.appearanceType === 'swing') covers++;
    }
    for (i=0;i<apps.length;i++) if (apps[i].coverType || apps[i].appearanceType === 'swing') covers++;
    return '<article class="card perfCard" onclick="TD.go(\'perf\','+p.id+')"><div class="showTitle">'+esc(showOf(p))+'</div><div class="meta">'+esc(fmtDate(p.date))+' · '+esc(p.time||'')+'</div><div class="meta">'+esc(venueOf(p))+'</div><div class="chips"><span class="chip">'+esc(p.type||'Unknown')+'</span>'+(covers?'<span class="chip cover">'+covers+' cover/special</span>':'')+'</div><p class="tiny">'+esc(preview.join(' · '))+'</p></article>';
  }

  function renderPerformance(id) {
    var p = byId(db.performances,id);
    if (!p) return '<main class="wrap"><section class="card"><h1>Performance not found</h1></section></main>';
    var apps = (indexes.perfApps[id] || []).slice();
    apps.sort(function(a,b){ return (a.displayOrder||0)-(b.displayOrder||0); });
    var principal='', ensemble='', specials='', i,a,role,label;
    for (i=0;i<apps.length;i++) {
      a = apps[i]; role = byId(db.roles,a.roleId);
      label = a.coverLabel || (a.coverType ? a.coverType : '');
      if (a.appearanceType === 'ensemble') {
        ensemble += '<span class="ensChip">'+personLabel(a.personId,p.id)+'</span>';
      } else {
        var line = '<div class="castLine"><div class="role">'+esc(role ? role.name : (a.roleRaw||''))+'</div><div>'+personLabel(a.personId,p.id)+' '+(label?'<span class="chip cover">'+esc(label)+'</span>':'')+'</div></div>';
        if (a.appearanceType === 'swing') specials += line; else principal += line;
      }
    }
    var edits = localEdits[String(id)] || {};
    var note = edits.notes != null ? edits.notes : (p.notes || '');
    var raw = p.source && p.source.castNormalized ? p.source.castNormalized : '';
    var prevNext = nextPrev(id);
    return '<main class="wrap"><section class="hero"><div class="tiny">'+esc(p.type||'')+' · '+esc(p.time||'')+'</div><h1>'+esc(showOf(p))+'</h1><p class="muted">'+esc(fmtDate(p.date))+' · '+esc(venueOf(p))+'</p><div class="toolbar"><button class="btn" onclick="TD.go(\'perf\','+prevNext.prev+')">Previous</button><button class="btn" onclick="TD.go(\'perf\','+prevNext.next+')">Next</button><button class="btn" onclick="TD.go(\'show\','+p.showId+')">Show Page</button><button class="btn" onclick="TD.go(\'venue\','+p.venueId+')">Venue Page</button><button class="btn" onclick="TD.copyPerf('+id+')">Copy Info</button></div></section><div class="split"><section class="card"><h2>Cast</h2>'+principal+(specials?'<div class="section"><h3>Swings / Special Tracks</h3>'+specials+'</div>':'')+(ensemble?'<div class="section"><h3>Ensemble</h3><div class="ensemble">'+ensemble+'</div></div>':'')+'<div class="section"><h3>Creative Team</h3>'+renderCreatives(id)+'</div><details class="section"><summary class="muted">Raw cast text</summary><pre>'+esc(raw)+'</pre></details></section><aside class="card"><h2>Notes</h2><textarea class="textarea" oninput="TD.saveNote('+id+',this.value)">'+esc(note)+'</textarea><p class="tiny">Saved in this browser. Export edits if you want me to merge them later.</p><button class="btn" onclick="TD.exportEdits()">Export edits</button></aside></div></main>';
  }

  function renderCreatives(perfId) {
    var arr = db.creativeCredits || [], byCredit = {}, i,c,person,out='';
    for (i=0;i<arr.length;i++) if (arr[i].performanceId == perfId) {
      c = arr[i]; person = byId(db.people,c.personId);
      if (!byCredit[c.credit]) byCredit[c.credit] = [];
      byCredit[c.credit].push('<button class="nameBtn" onclick="TD.openPerson('+c.personId+')">'+esc(person?person.name:c.raw)+'</button>');
    }
    for (c in byCredit) if (Object.prototype.hasOwnProperty.call(byCredit,c)) out += '<div class="castLine"><div class="role">'+esc(c)+'</div><div>'+byCredit[c].join(' / ')+'</div></div>';
    return out || '<p class="muted">No creative team listed.</p>';
  }

  function nextPrev(id) {
    var ps = values(db.performances);
    ps.sort(function(a,b){ return String(a.date).localeCompare(String(b.date)) || a.id-b.id; });
    var i, idx=0;
    for (i=0;i<ps.length;i++) if (ps[i].id == id) { idx=i; break; }
    return {prev: ps[(idx-1+ps.length)%ps.length].id, next: ps[(idx+1)%ps.length].id};
  }

  function renderPersonPanel(personId) {
    var person = byId(db.people,personId);
    var arr = personAppearancesUnique(personId);
    var st = personStats(personId, null);
    var out = '<aside class="panel"><button class="btn overlayClose" onclick="TD.closePerson()">Close</button><h2>'+esc(person?person.name:'Person')+'</h2><p class="muted">'+arr.length+' performances · '+st.roles+' role/production combos</p><button class="btn" onclick="TD.go(\'person\','+personId+')">Open full profile</button><div class="section list">';
    var i, item;
    for (i=0;i<Math.min(arr.length,12);i++) {
      item = arr[i];
      out += '<div class="row"><button class="linkish" onclick="TD.go(\'perf\','+item.perf.id+')">'+esc(showOf(item.perf))+'</button><div class="tiny">'+esc(item.roles.join(' / '))+' · '+esc(fmtDate(item.perf.date))+'</div></div>';
    }
    return out + '</div></aside>';
  }

  function personAppearancesUnique(personId) {
    var apps = indexes.personAppearances[personId] || [];
    var map = {}, i,a,p,role,k,arr=[];
    for (i=0;i<apps.length;i++) {
      a = apps[i]; p = byId(db.performances,a.performanceId); role = byId(db.roles,a.roleId);
      if (!p) continue;
      k = String(p.id);
      if (!map[k]) map[k] = {perf:p, roles:[]};
      if (role) map[k].roles.push(role.name);
    }
    for (k in map) if (Object.prototype.hasOwnProperty.call(map,k)) arr.push(map[k]);
    arr.sort(function(a,b){ return String(b.perf.date).localeCompare(String(a.perf.date)); });
    return arr;
  }

  function renderPersonPage(personId) {
    var person = byId(db.people,personId), arr = personAppearancesUnique(personId), i,out='';
    out += '<main class="wrap"><section class="hero"><h1>'+esc(person?person.name:'Person')+'</h1><p class="muted">'+arr.length+' performances in your diary.</p></section><section class="card"><h2>Appearances</h2><div class="list">';
    for (i=0;i<arr.length;i++) out += '<div class="row"><button class="linkish" onclick="TD.go(\'perf\','+arr[i].perf.id+')">'+esc(showOf(arr[i].perf))+'</button><div class="tiny">'+esc(arr[i].roles.join(' / '))+' · '+esc(fmtDate(arr[i].perf.date))+' · '+esc(venueOf(arr[i].perf))+'</div></div>';
    return out + '</div></section></main>';
  }

  function renderShowPage(showId) {
    var show = byId(db.shows,showId), arr = (indexes.showPerfs[showId]||[]).slice(), i,out='';
    arr.sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); });
    out += '<main class="wrap"><section class="hero"><h1>'+esc(show?show.title:'Show')+'</h1><p class="muted">'+arr.length+' performances.</p></section><section class="grid">';
    for (i=0;i<arr.length;i++) out += perfCard(arr[i]);
    return out + '</section></main>';
  }

  function renderVenuePage(venueId) {
    var venue = byId(db.venues,venueId), arr = (indexes.venuePerfs[venueId]||[]).slice(), i,out='';
    arr.sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); });
    out += '<main class="wrap"><section class="hero"><h1>'+esc(venue?venue.name:'Venue')+'</h1><p class="muted">'+esc(venue&&venue.city?venue.city:'')+' · '+arr.length+' performances.</p></section><section class="grid">';
    for (i=0;i<arr.length;i++) out += perfCard(arr[i]);
    return out + '</section></main>';
  }

  function renderRoleCounts() {
    var people = values(db.people), rows=[], i,p,st;
    for (i=0;i<people.length;i++) {
      st = personStats(people[i].id,null);
      if (st.roles > 1) rows.push({person:people[i], roles:st.roles, perfs:Object.keys ? Object.keys(indexes.peoplePerfSets[people[i].id]||{}).length : 0});
    }
    rows.sort(function(a,b){ return b.roles-a.roles || b.perfs-a.perfs || a.person.name.localeCompare(b.person.name); });
    var out = '<main class="wrap"><section class="hero"><h1>Most Different Roles</h1><p class="muted">Counts by role/track within a production. Production = show + production type. Venue does not split the count. Cover type is ignored.</p></section><section class="card"><table class="table"><thead><tr><th>Person</th><th>Roles</th><th>Performances</th></tr></thead><tbody>';
    for (i=0;i<Math.min(rows.length,200);i++) out += '<tr><td><button class="linkish" onclick="TD.go(\'person\','+rows[i].person.id+')">'+esc(rows[i].person.name)+'</button></td><td>'+rows[i].roles+'</td><td>'+rows[i].perfs+'</td></tr>';
    return out + '</tbody></table></section></main>';
  }

  function readEdits() {
    try { return JSON.parse(localStorage.getItem('theatreDiaryEdits') || '{}'); } catch(e) { return {}; }
  }
  function saveEdits() {
    try { localStorage.setItem('theatreDiaryEdits', JSON.stringify(localEdits)); } catch(e) {}
  }
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text);
    else window.prompt('Copy this:', text);
  }

  window.TD = {
    go:function(v,id){ go(v,id,false); },
    back:navBack,
    forward:navForward,
    setQ:function(v){ state.query=v; state.limit=60; render(); },
    setYear:function(v){ state.year=v; state.limit=60; render(); },
    setType:function(v){ state.type=v; state.limit=60; render(); },
    toggleCovers:function(){ state.onlyCovers=!state.onlyCovers; state.limit=60; render(); },
    more:function(){ state.limit += 60; render(); },
    openPerson:function(id){ state.panelPerson=id; render(); },
    closePerson:function(){ state.panelPerson=null; render(); },
    random:function(){ var ps=values(db.performances); var p=ps[Math.floor(Math.random()*ps.length)]; go('perf',p.id,false); },
    saveNote:function(id,val){ if(!localEdits[String(id)]) localEdits[String(id)]={}; localEdits[String(id)].notes=val; saveEdits(); },
    exportEdits:function(){ copyText(JSON.stringify(localEdits,null,2)); alert('Edits JSON copied to clipboard.'); },
    copyPerf:function(id){
      var p=byId(db.performances,id); if(!p) return;
      var text = showOf(p)+'\n'+fmtDate(p.date)+' · '+venueOf(p)+'\n'+(p.source&&p.source.castNormalized?p.source.castNormalized:'');
      copyText(text);
    }
  };

  loadData();
})();

  </script>
</body>
</html>
